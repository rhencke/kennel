# PLC2401 = "non-ASCII characters in identifiers" — guards against the
# Cyrillic-vs-Latin homoglyph trap (e.g. ``Rescоpe`` with Cyrillic ``о``
# U+043E vs ``Rescope`` with Latin ``o`` U+006F) that bit us once and is
# invisible to a human reader.
ignore = ["E501"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
# unittest.mock.patch bypasses constructor-DI: it reaches into module internals
# to swap names from outside, creating invisible coupling and making it impossible
# to inject collaborators through the constructor.
# Use constructor-DI instead: production code accepts collaborators via __init__;
# tests construct the object with a hand-rolled fake or typed collaborator.
"unittest.mock.patch" = {msg = "Use constructor-DI: accept collaborators via __init__ and pass fakes at construction time. Do not patch module-level names from outside."}
"unittest.mock.patch.object" = {msg = "Use constructor-DI: accept collaborators via __init__ and pass fakes at construction time. Do not patch object attributes from outside."}
"unittest.mock.patch.dict" = {msg = "Use constructor-DI: accept collaborators via __init__ and pass fakes at construction time. Do not patch dict entries from outside."}
# unittest.mock.MagicMock is a generic dynamic mock — it hides ownership and
# makes constructor-DI migrations look complete while tests still depend on
# untyped behavior. Use hand-rolled mock classes, fakes, or typed collaborators
# instead; accept collaborators via __init__ and pass fakes at construction time.
# See CLAUDE.md 'OO + constructor-DI architecture' and #1773.
"unittest.mock.MagicMock" = {msg = "MagicMock is a generic dynamic mock — it hides ownership and makes constructor-DI look complete while tests still depend on untyped behavior. Use hand-rolled mock classes, fakes, spies, stubs, or typed collaborators instead (see #1773)."}

# #1816 / INV-B (#1800 / epic #1798): comment-driven task creation must go
# through the intent path — synthesis emits ``RescopeIntent`` → rescope produces
# tasks via Opus ops in a verdict envelope.  These helpers were the legacy
# direct-task path from comments; they have no remaining production callers
# (server.py wiring was removed in PR #1816).  The function bodies are kept
# only for the existing test suite which has not been migrated.  Adding a NEW
# production caller is forbidden — comments do not directly task.
"fido.events.create_task" = {msg = "Comments must follow the intent path (synthesis → RescopeIntent → rescope). Do not directly create tasks from comment handlers (#1816 / INV-B). Initial PR tasking uses Tasks.add directly in worker._apply_setup_outcome."}
"fido.events.queue_reply_tasks" = {msg = "Comments must follow the intent path (synthesis → RescopeIntent → rescope). Do not queue tasks from reply outcomes (#1816 / INV-B)."}
"fido.events._apply_reply_result" = {msg = "Reply outcomes no longer produce direct task side effects; the synthesis path emits RescopeIntent and rescope handles tasks (#1816 / INV-B)."}
"fido.events.reply_outcome_creates_tasks" = {msg = "Comment categories no longer drive direct task creation; the intent path is authoritative (#1816 / INV-B)."}

[tool.ruff.lint.per-file-ignores]
# Generated Rocq extraction output is format-checked by CI, but lint has
# intentional noise: reusable runtime imports, type aliases Rocq erases, and
# names copied from source terms. Tracked separately for cleanup via the
# OCaml extraction backend (`rocq-python-extraction/python.ml`); see issue.
# New rules adopted after this point apply uniformly — do NOT extend this list.
"src/fido/rocq/*.py" = [
  "ANN001", "ANN002", "ANN003", "ANN201", "ANN202", "ANN204", "ANN206", "ANN401",
  "E741", "F401", "F403", "F405", "F541", "F811", "F821", "F841", "I001",
]
# Temporary TID251 exemptions — existing mock.patch and MagicMock sites pending
