[tool.ruff]
target-version = "py314"
extend-exclude = [".venv", "venv", "_build"]

[tool.ruff.lint]
# Considered and skipped (with reason):
# - BLE001 (blind-except): 23 legitimate fallback / best-effort sites
#   (codex reader, gh-status provider chain, LSP dispatch, auto-merge,
#   thread-test exception-capture fixtures). Adopting it would force
#   either narrowing each catch (per-site refactor work, separate PR)
#   or noqa pollution. Defer to a focused audit pass.
# - FURB101 / FURB103 / FURB113 / FURB118 (and many other FURB rules):
#   preview-only in this ruff version. Adopting them produces a "no
#   effect because preview is not enabled" warning on every run; revisit
#   when we turn preview on globally.
