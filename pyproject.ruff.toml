# PLC2401 = "non-ASCII characters in identifiers" — guards against the
# Cyrillic-vs-Latin homoglyph trap (e.g. ``Rescоpe`` with Cyrillic ``о``
# U+043E vs ``Rescope`` with Latin ``o`` U+006F) that bit us once and is
# invisible to a human reader.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Generated Rocq extraction output is format-checked by CI, but lint has
# intentional noise: reusable runtime imports, type aliases Rocq erases, and
# names copied from source terms. Tracked separately for cleanup via the
# OCaml extraction backend (`rocq-python-extraction/python.ml`); see issue.
# New rules adopted after this point apply uniformly — do NOT extend this list.
"src/fido/rocq/*.py" = [
  "ANN001", "ANN002", "ANN003", "ANN201", "ANN202", "ANN204", "ANN206", "ANN401",
  "E741", "F401", "F403", "F405", "F541", "F811", "F821", "F841", "I001",
]
