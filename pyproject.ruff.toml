[tool.ruff]
target-version = "py314"
extend-exclude = [".venv", "venv", "_build"]

[tool.ruff.lint]
# Considered and skipped (with reason):
# - BLE001 (blind-except): 23 legitimate fallback / best-effort sites
#   (codex reader, gh-status provider chain, LSP dispatch, auto-merge,
#   thread-test exception-capture fixtures). Adopting it would force
#   either narrowing each catch (per-site refactor work, separate PR)
#   or noqa pollution. Defer to a focused audit pass.
select = [
  "ANN001",
  "ANN002",
  "ANN003",
  "ANN201",
  "ANN202",
  "ANN204",
  "ANN206",
  "ANN401",
  "ASYNC100",
  "ASYNC105",
  "ASYNC115",
  "ASYNC116",
  "ASYNC210",
  "ASYNC220",
  "ASYNC221",
  "ASYNC222",
  "ASYNC230",
  "ASYNC251",
  "B002",
  "B003",
  "B004",
  "B005",
  "B006",
  "B007",
  "B008",
  "B009",
  "B010",
  "B011",
  "B012",
  "B013",
  "B014",
  "B015",
  "B016",
  "B017",
  "B018",
  "B019",
  "B020",
  "B021",
  "B022",
  "B023",
  "B024",
  "B025",
  "B026",
  "B029",
  "B030",
  "B032",
  "B033",
  "B034",
  "C400",
  "C401",
  "C402",
  "C403",
  "C404",
  "E",
  "F",
  "I",
  "PLC2401",
  "W",
]
# PLC2401 = "non-ASCII characters in identifiers" — guards against the
# Cyrillic-vs-Latin homoglyph trap (e.g. ``Rescоpe`` with Cyrillic ``о``
# U+043E vs ``Rescope`` with Latin ``o`` U+006F) that bit us once and is
# invisible to a human reader.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Generated Rocq extraction output is format-checked by CI, but lint has
# intentional noise: reusable runtime imports, type aliases Rocq erases, and
# names copied from source terms. Tracked separately for cleanup via the
# OCaml extraction backend (`rocq-python-extraction/python.ml`); see issue.
# New rules adopted after this point apply uniformly — do NOT extend this list.
"src/fido/rocq/*.py" = [
  "ANN001", "ANN002", "ANN003", "ANN201", "ANN202", "ANN204", "ANN206", "ANN401",
  "E741", "F401", "F403", "F405", "F541", "F811", "F821", "F841", "I001",
]
