[tool.pytest.ini_options]
testpaths = ["tests", "rocq-python-extraction/test"]
addopts = "-n auto"
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["fido", "rocq-python-extraction/test"]
# Exclude generated Rocq extraction output — tested indirectly via the
# Docker-backed CI build, not by the Python test suite.
omit = [
  "src/fido/rocq/*",
  "rocq-python-extraction/test/conftest.py",
  "rocq-python-extraction/test/pyright_*.py",
]

[tool.coverage.report]
exclude_also = ["if __name__ == .__main__.:"]
fail_under = 100
