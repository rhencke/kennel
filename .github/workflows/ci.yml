# Generated by .github/workflows/generate_ci.py; do not edit by hand.
# Buildx gha cache scopes discovered from bake: fido, format, generated-typecheck, lint, rocq-image, test, typecheck
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 */6 * *'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      FIDO_BUILDX_CACHE_BACKEND: gha
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        id: setup-buildx
      - name: Compute build cache bucket
        id: build-cache
        run: echo "bucket=$(( $(date +%s) / 518400 ))" >> "$GITHUB_OUTPUT"
      - name: Restore rocq-model-image build cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/rocq-models/image
          key: buildx-rocq-model-image-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildx-rocq-model-image-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-
            buildx-rocq-model-image-${{ runner.os }}-
      - name: Restore rocq-model-buildx build cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/rocq-models/buildx
          key: buildx-rocq-model-buildx-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildx-rocq-model-buildx-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-
            buildx-rocq-model-buildx-${{ runner.os }}-
      - name: Restore rocq-model-context build cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/rocq-models/context
          key: buildx-rocq-model-context-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildx-rocq-model-context-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-
            buildx-rocq-model-context-${{ runner.os }}-
      - name: Restore buildkit cache mounts
        uses: actions/cache@v4
        with:
          path: .cache/buildkit-mounts
          key: buildkit-mounts-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildkit-mounts-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-
            buildkit-mounts-${{ runner.os }}-
      - name: Inject buildkit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: .cache/buildkit-mounts
          dockerfile: models/Dockerfile
      - run: ./.githooks/pre-commit
      - name: Check committed model mirrors
        run: |
          ./fido make-rocq
          git diff --exit-code -- src/fido/rocq/
      - name: Save rocq-model-image build cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/rocq-models/image
          key: buildx-rocq-model-image-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Save rocq-model-buildx build cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/rocq-models/buildx
          key: buildx-rocq-model-buildx-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Save rocq-model-context build cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/rocq-models/context
          key: buildx-rocq-model-context-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ github.run_id }}-${{ github.run_attempt }}
