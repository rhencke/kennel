name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: docker/setup-buildx-action@v3
      - name: Restore Rocq image cache
        uses: actions/cache@v4
        with:
          path: .cache/rocq-image
          key: rocq-image-${{ runner.os }}-${{ hashFiles('rocq-python-extraction/Dockerfile') }}
          restore-keys: |
            rocq-image-${{ runner.os }}-
      - name: Build Rocq extraction image
        run: |
          CACHE_ARGS=()
          if [ -d .cache/rocq-image ]; then
            CACHE_ARGS+=(--cache-from type=local,src=.cache/rocq-image)
          fi
          rm -rf .cache/rocq-image-next
          docker buildx build \
            --file rocq-python-extraction/Dockerfile \
            --load \
            --tag rocq-python-extraction:ci \
            "${CACHE_ARGS[@]}" \
            --cache-to type=local,dest=.cache/rocq-image-next,mode=max \
            rocq-python-extraction
          rm -rf .cache/rocq-image
          mv .cache/rocq-image-next .cache/rocq-image
      - run: ./.githooks/pre-commit
