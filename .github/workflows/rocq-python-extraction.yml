name: rocq-python-extraction CI

on:
  push:
    branches: [main]
    paths:
      - 'rocq-python-extraction/**'
      - 'models/**'
      - 'dune-workspace'
      - '.github/workflows/rocq-python-extraction.yml'
  pull_request:
    paths:
      - 'rocq-python-extraction/**'
      - 'models/**'
      - 'dune-workspace'
      - '.github/workflows/rocq-python-extraction.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Set up buildx so we can use the GitHub Actions layer cache.
      - uses: docker/setup-buildx-action@v3

      # Build from the local Dockerfile with layer caching.  Unchanged layers
      # (especially the opam install step, which takes most of the build time)
      # are restored from the GHA cache so only changed layers are rebuilt.
      # Dockerfile changes in a PR still take effect immediately because the
      # cache is content-addressed per layer.
      - name: Build container image
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --load \
            -t rocq-python-extraction:ci \
            rocq-python-extraction

      - name: Build and test extraction plugin
        run: |
          docker run --rm -v "$PWD:/src:ro" rocq-python-extraction:ci \
            sh -c "cp -r /src /tmp/work && cd /tmp/work/rocq-python-extraction && opam exec -- make test"

      # Build the models/ theory using the unified dune workspace.  dune
      # resolves the plugin → theory dependency within the workspace so no
      # separate install step is needed.  This verifies that every .v model
      # extracts successfully whenever models/ or the plugin changes.
      - name: Build models
        run: |
          docker run --rm -v "$PWD:/src:ro" rocq-python-extraction:ci \
            bash -euo pipefail -c '
              cp -r /src /tmp/work
              chmod -R u+w /tmp/work
              cd /tmp/work
              opam exec -- dune build models/
            '
