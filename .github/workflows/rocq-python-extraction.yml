name: rocq-python-extraction CI

on:
  push:
    branches: [main]
    paths:
      - 'rocq-python-extraction/**'
      - 'models/**'
      - 'build'
      - 'dune-workspace'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.githooks/pre-commit'
      - '.dockerignore'
      - '.github/workflows/rocq-python-extraction.yml'
  pull_request:
    # No path filter — this is a required check that must report on every PR.
    # PRs that don't touch Rocq/models files short-circuit green in the
    # "Check for relevant changes" step below, so unrelated PRs stay fast.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff against PR base SHA

      # Short-circuit green for PRs that don't touch Rocq or models files.
      # This job is a required check, so it must run on every PR — but the
      # expensive Docker build only fires when relevant files actually changed.
      # Push events already pass through path filters on the trigger, so they
      # are always treated as relevant here.
      - name: Check for relevant changes
        id: changes
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            if echo "$CHANGED" | grep -qE '^(rocq-python-extraction/|models/|build$|dune-workspace$|\.python-version$|pyproject\.toml$|uv\.lock$|\.githooks/pre-commit$|\.dockerignore$|\.github/workflows/rocq-python-extraction\.yml$)'; then
              echo "relevant=true"  >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "No Rocq/models files changed — short-circuiting green."
            fi
          else
            # Push event: path filters on the trigger already gate relevance.
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute build cache bucket
        if: steps.changes.outputs.relevant == 'true'
        id: build-cache
        run: echo "bucket=$(( $(date +%s) / 518400 ))" >> "$GITHUB_OUTPUT"

      - name: Restore build cache
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/cache@v4
        with:
          path: .cache/rocq-models
          key: buildx-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-${{ hashFiles('rocq-python-extraction/**', 'models/**', 'dune-workspace', '.python-version', 'pyproject.toml', 'uv.lock', 'build', '.dockerignore', '.githooks/pre-commit') }}
          restore-keys: |
            buildx-${{ runner.os }}-${{ steps.build-cache.outputs.bucket }}-
            buildx-${{ runner.os }}-

      - name: Run buildx CI checks
        if: steps.changes.outputs.relevant == 'true'
        run: ./.githooks/pre-commit

      - name: Build committed model mirrors
        if: steps.changes.outputs.relevant == 'true'
        run: ./build

      - name: Check committed model mirrors
        if: steps.changes.outputs.relevant == 'true'
        run: git diff --exit-code -- kennel/models_generated/
