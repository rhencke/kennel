name: rocq-python-extraction CI

on:
  push:
    branches: [main]
    paths:
      - 'rocq-python-extraction/**'
      - 'models/**'
      - 'dune-workspace'
      - '.github/workflows/rocq-python-extraction.yml'
  pull_request:
    # No path filter — this is a required check that must report on every PR.
    # PRs that don't touch Rocq/models files short-circuit green in the
    # "Check for relevant changes" step below, so unrelated PRs stay fast.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff against PR base SHA

      # Short-circuit green for PRs that don't touch Rocq or models files.
      # This job is a required check, so it must run on every PR — but the
      # expensive Docker build only fires when relevant files actually changed.
      # Push events already pass through path filters on the trigger, so they
      # are always treated as relevant here.
      - name: Check for relevant changes
        id: changes
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
            if echo "$CHANGED" | grep -qE '^(rocq-python-extraction/|models/|dune-workspace$|\.github/workflows/rocq-python-extraction\.yml$)'; then
              echo "relevant=true"  >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "No Rocq/models files changed — short-circuiting green."
            fi
            if echo "$CHANGED" | grep -q '^rocq-python-extraction/Dockerfile$'; then
              echo "dockerfile_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "dockerfile_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Push event: path filters on the trigger already gate relevance.
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "dockerfile_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Fast path: Dockerfile is unchanged, so pull the already-built image
      # from ghcr.io instead of rebuilding it.  This avoids the ~1:30 overhead
      # of `load: true` even when all layers are cached.
      - name: Pull pre-built container image
        if: steps.changes.outputs.relevant == 'true' && steps.changes.outputs.dockerfile_changed == 'false'
        run: |
          docker pull ghcr.io/fidocancode/rocq-python-extraction:latest
          docker tag ghcr.io/fidocancode/rocq-python-extraction:latest rocq-python-extraction:ci

      # Set up buildx so we can use the GitHub Actions layer cache.
      # Only needed when the Dockerfile itself changed and we must rebuild.
      - name: Set up Docker Buildx
        if: steps.changes.outputs.relevant == 'true' && steps.changes.outputs.dockerfile_changed == 'true'
        uses: docker/setup-buildx-action@v3

      # Build from the local Dockerfile with layer caching.  Only runs when
      # the Dockerfile actually changed in this PR so the change can be tested
      # before merge.  Unchanged layers (especially the opam install step) are
      # restored from the GHA cache.  The scope key isolates this workflow's
      # cache from the publish workflow's so the two don't clobber each other.
      - name: Build container image
        if: steps.changes.outputs.relevant == 'true' && steps.changes.outputs.dockerfile_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: rocq-python-extraction
          push: false
          load: true
          cache-from: type=gha,scope=rocq-python-extraction
          cache-to: type=gha,mode=max,scope=rocq-python-extraction
          tags: rocq-python-extraction:ci

      - name: Build and test extraction plugin
        if: steps.changes.outputs.relevant == 'true'
        run: |
          docker run --rm -v "$PWD:/src:ro" rocq-python-extraction:ci \
            sh -c "cp -r /src /tmp/work && rm -f /tmp/work/dune-workspace && cd /tmp/work/rocq-python-extraction && opam exec -- make test"

      # Build the models/ theory using the unified dune workspace.  dune
      # resolves the plugin → theory dependency within the workspace so no
      # separate install step is needed.  This verifies that every .v model
      # extracts successfully whenever models/ or the plugin changes.
      - name: Build models
        if: steps.changes.outputs.relevant == 'true'
        run: |
          docker run --rm -v "$PWD:/src:ro" rocq-python-extraction:ci \
            bash -euo pipefail -c '
              cp -r /src /tmp/work
              chmod -R u+w /tmp/work
              cd /tmp/work
              opam exec -- dune build models/
            '
