[project]
name = "kennel"
version = "0.1.0"
description = "GitHub webhook listener for Fido"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = ["ruff", "pytest", "pytest-cov"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
kennel = "kennel.main:main"

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["kennel"]

[tool.coverage.report]
fail_under = 100

