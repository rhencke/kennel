[project]
name = "kennel"
version = "0.1.0"
description = "GitHub webhook listener for Fido"
requires-python = ">=3.14"
dependencies = [
    "agent-client-protocol>=0.9.0",
    "requests",
]

[dependency-groups]
dev = ["pyright", "ruff", "pytest", "pytest-cov", "pytest-xdist"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
kennel = "kennel.main:main"

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-n auto"

[tool.coverage.run]
source = ["kennel"]

[tool.coverage.report]
fail_under = 100

